<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">

  <!-- PWA & Theme -->
  <meta name="theme-color" content="#08080f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Журнал">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Журнал Студента">
  <meta name="description" content="Умный журнал студента с аналитикой успеваемости и посещаемости">

  <!-- Open Graph -->
  <meta property="og:title" content="Журнал Студента">
  <meta property="og:description" content="Расписание, оценки, дедлайны и аналитика">
  <meta property="og:type" content="website">

  <title>Журнал Студента</title>

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="icon" type="image/svg+xml" href="icons/icon-192.svg">

  <!-- Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Prevent FOUC -->
  <style>
    body { background: #08080f; }
    .splash {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #08080f; z-index: 9999;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    .splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      animation: splashPulse 1.2s ease-in-out infinite alternate;
      box-shadow: 0 0 40px rgba(124,58,237,0.5);
    }
    @keyframes splashPulse {
      from { transform: scale(1);    box-shadow: 0 0 30px rgba(124,58,237,0.4); }
      to   { transform: scale(1.06); box-shadow: 0 0 60px rgba(124,58,237,0.7); }
    }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div class="splash" id="splash">
    <div class="splash-logo">📚</div>
  </div>

  <script src="app.js"></script>
  <script>
    // Hide splash after app boots
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const s = document.getElementById('splash');
        if (s) { s.classList.add('hide'); setTimeout(() => s.remove(), 450); }
      }, 600);
    });
  </script>
</body>
</html>
